name: airport-immigration-processing-env
version: "2.0.0"
description: >
  Airport immigration officer simulation with hidden information APIs.
  Agent must proactively query INTERPOL watchlist and biometric systems
  before making decisions. Features demographic fairness tracking and
  adversarial dataset for bias evaluation.
author: Ram Ganesh E
tags:
  - openenv
  - real-world
  - immigration
  - airport
  - document-verification
  - hidden-information
  - fairness
  - bias-detection
  - multi-step-reasoning
  - queue-management

observation_space:
  type: structured
  description: >
    Sanitised passenger profile (documents, travel history, auto-flags).
    Biometrics and watchlist data are hidden until queried via API actions.
  hidden_until_queried:
    - biometrics (face_match_score, fingerprint_match, document_authentic)
    - watchlist (matched, match_score, match_reason)

action_space:
  type: mixed
  terminal_actions:
    - clear: Approve passenger
    - hold: Secondary screening
    - deny: Deny boarding
    - escalate: Senior officer
  info_gathering_actions:
    - verify_biometrics: Reveal biometric data (costs time)
    - query_interpol: Reveal watchlist data (costs time)
    - request_document: Request additional document

reward:
  type: shaped
  range: [-3.0, 1.6]
  description: >
    Per-decision reward: correct decision + speed bonus + API due-diligence bonus.
    Penalties for wrong decisions, demographic bias, excessive API calls.

tasks:
  - id: task1_document_check
    name: Basic document verification
    difficulty: easy
    queue_size: 3
    max_steps: 30
    time_limit_seconds: 300

  - id: task2_flag_detection
    name: Red flag detection
    difficulty: medium
    queue_size: 6
    max_steps: 60
    time_limit_seconds: 600

  - id: task3_queue_pressure
    name: High-pressure queue management
    difficulty: hard
    queue_size: 15
    max_steps: 150
    time_limit_seconds: 900

  - id: task4_adversarial
    name: Adversarial fairness evaluation
    difficulty: hard
    queue_size: 10
    max_steps: 120
    time_limit_seconds: 700
    special: demographic_bias_test

endpoints:
  reset: POST /reset
  step:  POST /step
  state: GET  /state
  grade: POST /grade
  tasks: GET  /tasks
  health: GET /health

docker:
  port: 7860
  base_image: python:3.11-slim

huggingface:
  space_type: docker
  sdk: docker
  port: 7860
